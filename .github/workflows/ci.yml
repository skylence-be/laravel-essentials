name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate composer.json
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Validate
        run: composer validate --strict

  install:
    name: "PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}"
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4"]
        laravel: ["^11.0", "^12.0", "^13.0"]

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Require specific Laravel version
        run: composer require "laravel/framework:${{ matrix.laravel }}" --no-update --dev

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Security audit
        run: composer audit
